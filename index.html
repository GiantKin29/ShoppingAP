<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="買い物リスト">
  <meta name="theme-color" content="#1a56db">
  <title>買い物リスト</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>買い物リスト</h1>
    <div class="header-actions">
      <button id="settingsBtn" class="header-btn" title="同期設定">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
      <button id="editBtn" class="header-btn" title="編集モード">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
      </button>
    </div>
  </header>

  <main id="main">
    <ul id="itemList"></ul>
    <div id="emptyState" class="empty-state hidden">
      <p>品目がまだありません</p>
      <button id="addFirstBtn" class="btn-primary">＋ 品目を追加する</button>
    </div>
  </main>

  <div id="cartBar" class="cart-bar hidden">
    <button id="amazonBtn" class="cart-btn cart-btn--amazon">
      <span class="cart-btn__logo">amazon</span>
      <span class="cart-btn__label">まとめてカート追加</span>
      <span class="cart-btn__badge" id="amazonBadge">0</span>
    </button>
    <button id="seiyuBtn" class="cart-btn cart-btn--seiyu">
      <span class="cart-btn__logo">西友</span>
      <span class="cart-btn__label">まとめてカート追加</span>
      <span class="cart-btn__badge" id="seiyuBadge">0</span>
    </button>
  </div>

  <button id="addBtn" class="fab hidden" title="品目を追加">＋</button>

  <div id="modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <h2 class="modal-title" id="modalTitle">品目を追加</h2>
      <div class="form-group">
        <label for="inputName">品名 <span class="required">*</span></label>
        <input type="text" id="inputName" placeholder="例：牛乳" autocomplete="off">
      </div>
      <div class="form-group">
        <label for="inputUnit">単位</label>
        <input type="text" id="inputUnit" placeholder="例：本、個、袋、枚" autocomplete="off">
      </div>
      <div class="form-group">
        <label for="inputAsin">Amazon ASIN</label>
        <input type="text" id="inputAsin" placeholder="例：B07XXXXXXXXX" autocomplete="off">
        <small>商品ページURL内の /dp/XXXXXXXXX の部分</small>
      </div>
      <div class="form-group">
        <label for="inputSeiyuId">西友 商品ID</label>
        <input type="text" id="inputSeiyuId" placeholder="例：4902720165457" autocomplete="off">
        <small>商品ページURL内の /item/XXXXX/ の部分</small>
      </div>
      <div class="modal-actions">
        <button id="modalCancelBtn" class="btn-secondary">キャンセル</button>
        <button id="modalSaveBtn" class="btn-primary">保存</button>
      </div>
    </div>
  </div>

  <div id="deleteModal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-backdrop"></div>
    <div class="modal-content modal-content--small">
      <h2 class="modal-title">削除しますか？</h2>
      <p id="deleteModalName" class="modal-desc"></p>
      <div class="modal-actions">
        <button id="deleteCancelBtn" class="btn-secondary">キャンセル</button>
        <button id="deleteConfirmBtn" class="btn-danger">削除</button>
      </div>
    </div>
  </div>

  <div id="settingsModal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <h2 class="modal-title">同期設定</h2>
      <p class="modal-desc">スマホ↔PCでリストを共有するには、GitHubのアクセストークンが必要です。</p>
      <div class="form-group">
        <label for="inputPat">GitHub Personal Access Token</label>
        <input type="password" id="inputPat" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" autocomplete="off" spellcheck="false">
        <small>
          <a id="patLink" href="https://github.com/settings/tokens/new?scopes=repo&description=%E8%B2%B7%E3%81%84%E7%89%A9%E3%83%AA%E3%82%B9%E3%83%88" target="_blank" rel="noopener">← ここをクリックしてトークンを取得</a>（"repo" のみチェック → Generate token）
        </small>
      </div>
      <div id="patStatus" class="pat-status hidden"></div>
      <div class="modal-actions">
        <button id="settingsCancelBtn" class="btn-secondary">キャンセル</button>
        <button id="settingsTestBtn" class="btn-secondary">接続テスト</button>
        <button id="settingsSaveBtn" class="btn-primary">保存</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast hidden" role="alert"></div>

  <script src="app.js"></script>
</body>
</html>
