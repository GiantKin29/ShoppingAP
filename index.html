<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="買い物リスト">
  <meta name="theme-color" content="#2563eb">
  <title>買い物リスト</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="header-icon">🛒</div>
      <h1>買い物リスト</h1>
    </div>
  </header>

  <main>
    <ul id="itemList"></ul>
    <div id="emptyState" class="empty-state hidden">
      <div class="empty-icon">📝</div>
      <p>品目がまだありません</p>
      <button id="addFirstBtn" class="btn-primary">＋ 品目を追加する</button>
    </div>
    <div class="footer-settings">
      <button id="settingsLink" class="settings-link">⚙ 同期設定</button>
    </div>
  </main>

  <!-- カートバー -->
  <div id="cartBar" class="cart-bar hidden">
    <button id="amazonBtn" class="cart-btn cart-btn--amazon">
      <span class="cart-btn__logo">amazon</span>
      <span class="cart-btn__label">まとめてカート追加</span>
      <span class="cart-btn__badge" id="amazonBadge">0</span>
    </button>
    <button id="seiyuBtn" class="cart-btn cart-btn--seiyu">
      <span class="cart-btn__logo">西友</span>
      <span class="cart-btn__label">まとめてカート追加</span>
      <span class="cart-btn__badge" id="seiyuBadge">0</span>
    </button>
  </div>

  <!-- 追加FABボタン -->
  <button id="addBtn" class="fab" title="品目を追加">＋</button>

  <!-- 品目編集モーダル -->
  <div id="modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <h2 class="modal-title" id="modalTitle">品目を追加</h2>
      <div class="form-group">
        <label for="inputName">品名 <span class="required">*</span></label>
        <input type="text" id="inputName" placeholder="例：牛乳" autocomplete="off">
      </div>
      <div class="form-group">
        <label for="inputUnit">単位</label>
        <input type="text" id="inputUnit" placeholder="例：本、個、袋" autocomplete="off">
      </div>
      <div class="form-group">
        <label for="inputAsin">Amazon ASIN</label>
        <input type="text" id="inputAsin" placeholder="例：B07XXXXXXXXX" autocomplete="off">
        <small>商品ページURL内の /dp/XXXXXXXXX の部分</small>
      </div>
      <div class="form-group">
        <label for="inputSeiyuId">西友 商品ID</label>
        <input type="text" id="inputSeiyuId" placeholder="例：4902720165457" autocomplete="off">
        <small>商品ページURL内の /item/XXXXX/ の部分</small>
      </div>
      <div class="modal-actions">
        <button id="modalCancelBtn" class="btn-secondary">キャンセル</button>
        <button id="modalSaveBtn" class="btn-primary">保存</button>
      </div>
    </div>
  </div>

  <!-- 同期設定モーダル -->
  <div id="settingsModal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <h2 class="modal-title">同期設定</h2>
      <p class="modal-desc">スマホ↔PCでリストを共有するには、GitHubのアクセストークンが必要です。</p>
      <div class="form-group">
        <label for="inputPat">GitHub Personal Access Token</label>
        <input type="password" id="inputPat" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" autocomplete="off" spellcheck="false">
        <small>
          <a href="https://github.com/settings/tokens/new?scopes=repo&description=%E8%B2%B7%E3%81%84%E7%89%A9%E3%83%AA%E3%82%B9%E3%83%88" target="_blank" rel="noopener">← ここをクリックしてトークンを取得</a>（"repo" のみチェック → Generate token）
        </small>
      </div>
      <div id="patStatus" class="pat-status hidden"></div>
      <div class="modal-actions">
        <button id="settingsCancelBtn" class="btn-secondary">キャンセル</button>
        <button id="settingsTestBtn" class="btn-secondary">接続テスト</button>
        <button id="settingsSaveBtn" class="btn-primary">保存</button>
      </div>
    </div>
  </div>

  <!-- Toast通知 -->
  <div id="toast" class="toast hidden" role="alert"></div>

  <script src="app.js"></script>
</body>
</html>
